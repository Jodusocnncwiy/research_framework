                                                    value={analysis.aiPromptText}
                                                    className="w-full flex-1 bg-white border border-slate-200 rounded-lg p-2 text-[10px] text-slate-500 font-mono resize-none focus:outline-none"
                                                />
                                            </div>

                                        </div>
                                    )}

                                </div>
                            </div>
                        </main>

                        {/* RIGHT INSPECTOR PANEL */}
                        <aside className="w-80 bg-white border-l border-cyan-100/80 p-5 flex flex-col space-y-5 overflow-y-auto shrink-0">
                            <h2 className="text-xs font-bold tracking-wider text-slate-400 uppercase select-none">屬性檢視面板 (Inspector)</h2>

                            {selectedNode && (
                                <div className="space-y-4">
                                    <div className="pb-3 border-b border-slate-100 select-none">
                                        <span className="text-[10px] font-bold text-cyan-600">變數屬性</span>
                                        <h3 className="text-base font-bold text-slate-800 truncate mt-0.5">{selectedNode.label}</h3>
                                    </div>

                                    <div>
                                        <label className="block text-[11px] text-slate-500 mb-1.5 select-none">變數名稱</label>
                                        <input
                                            type="text"
                                            value={selectedNode.label}
                                            onChange={(e) => handleUpdateNodeLabel(e.target.value)}
                                            className="w-full bg-slate-50 border border-slate-200 rounded-lg px-3 py-2 text-xs text-slate-800 focus:outline-none focus:border-cyan-500 transition shadow-sm"
                                        />
                                    </div>

                                    <div>
                                        <label className="block text-[11px] text-slate-500 mb-1.5 select-none">理論基本角色</label>
                                        <select
                                            value={selectedNode.type}
                                            onChange={(e) => handleUpdateNodeType(e.target.value)}
                                            className="w-full bg-slate-50 border border-slate-200 rounded-lg px-3 py-2 text-xs text-slate-800 focus:outline-none focus:border-cyan-500 transition shadow-sm"
                                        >
                                            {Object.entries(VARIABLE_TYPES).map(([key, meta]) => (
                                                <option key={key} value={key}>{meta.label}</option>
                                            ))}
                                        </select>
                                        <p className="text-[10px] text-slate-400 mt-2 leading-relaxed select-none bg-slate-50 p-2.5 rounded-lg border border-slate-100">
                                            {VARIABLE_TYPES[selectedNode.type]?.desc}
                                        </p>
                                    </div>

                                    <div>
                                        <label className="block text-[11px] text-slate-500 mb-1.5 select-none">變數學術定義 / 操作化備註</label>
                                        <textarea
                                            rows="4"
                                            value={selectedNode.desc || ''}
                                            onChange={(e) => handleUpdateNodeDesc(e.target.value)}
                                            placeholder="請輸入此變數在本研究中的具體定義、操作化衡量方式或相關理論來源..."
                                            className="w-full bg-slate-50 border border-slate-200 rounded-lg px-3 py-2 text-xs text-slate-800 focus:outline-none focus:border-cyan-500 transition resize-none leading-relaxed shadow-sm"
                                        />
                                    </div>

                                    <div className="pt-4 select-none">
                                        <button
                                            onClick={handleDeleteSelected}
                                            className="w-full bg-rose-50 text-rose-700 hover:bg-rose-100 border border-rose-200 py-2 rounded-lg text-xs font-bold transition flex items-center justify-center space-x-1.5"
                                        >
                                            <i className="fa-solid fa-trash-can"></i>
                                            <span>刪除此變數</span>
                                        </button>
                                    </div>
                                </div>
                            )}

                            {selectedEdge && (
                                <div className="space-y-4">
                                    <div className="pb-3 border-b border-slate-100 select-none">
                                        <span className="text-[10px] font-bold text-emerald-600">關係路徑屬性</span>
                                        <h3 className="text-xs font-bold text-slate-700 mt-1 break-all bg-slate-50 p-2 rounded-lg border border-slate-200">
                                            {getEdgeLabelRepresentation(selectedEdge)}
                                        </h3>
                                    </div>

                                    <div>
                                        <label className="block text-[11px] text-slate-500 mb-1.5 select-none">假說編號 (例如：H1, H2)</label>
                                        <input
                                            type="text"
                                            value={selectedEdge.label}
                                            onChange={(e) => handleUpdateEdgeLabel(e.target.value)}
                                            className="w-full bg-slate-50 border border-slate-200 rounded-lg px-3 py-2 text-xs text-slate-800 focus:outline-none focus:border-cyan-500 transition font-mono shadow-sm"
                                        />
                                    </div>

                                    <div>
                                        <label className="block text-[11px] text-slate-500 mb-1.5 select-none">預期關聯性質</label>
                                        <div className="grid grid-cols-3 gap-1.5 select-none">
                                            {[
                                                { val: '+', lbl: '正向 (+)' },
                                                { val: '-', lbl: '負向 (-)' },
                                                { val: '', lbl: '顯著' }
                                            ].map(opt => (
                                                <button
                                                    key={opt.val}
                                                    onClick={() => handleUpdateEdgeEffect(opt.val)}
                                                    className={`py-1.5 rounded-lg text-xs font-semibold border transition ${
                                                        selectedEdge.effect === opt.val 
                                                            ? 'bg-cyan-50 border-cyan-300 text-cyan-800 shadow-sm' 
                                                            : 'bg-slate-50 border-slate-200 text-slate-500 hover:border-slate-300 hover:bg-slate-100'
                                                    }`}
                                                >
                                                    {opt.lbl}
                                                </button>
                                            ))}
                                        </div>
                                    </div>

                                    <div>
                                        <label className="block text-[11px] text-slate-500 mb-1.5 select-none">假說理論補充說明</label>
                                        <textarea
                                            rows="4"
                                            value={selectedEdge.desc || ''}
                                            onChange={(e) => handleUpdateEdgeDesc(e.target.value)}
                                            placeholder="請輸入：如「該效果預期會被調節變數削弱」"
                                            className="w-full bg-slate-50 border border-slate-200 rounded-lg px-3 py-2 text-xs text-slate-800 focus:outline-none focus:border-cyan-500 transition resize-none leading-relaxed shadow-sm"
                                        />
                                    </div>

                                    <div className="pt-4 select-none">
                                        <button
                                            onClick={handleDeleteSelected}
                                            className="w-full bg-rose-50 text-rose-700 hover:bg-rose-100 border border-rose-200 py-2 rounded-lg text-xs font-bold transition flex items-center justify-center space-x-1.5"
                                        >
                                            <i className="fa-solid fa-trash-can"></i>
                                            <span>刪除關係路徑</span>
                                        </button>
                                    </div>
                                </div>
                            )}

                            {!selectedNode && !selectedEdge && (
                                <div className="flex flex-col items-center justify-center text-center p-6 border border-dashed border-slate-200 rounded-2xl h-56 text-slate-400 select-none">
                                    <i className="fa-solid fa-arrow-pointer text-lg mb-2 text-slate-300"></i>
                                    <p className="text-xs leading-relaxed text-slate-400">
                                        點擊畫布上的變數節點<br />
                                        或關係線中點的「H標籤」<br />
                                        即可在此修改其細部屬性與說明
                                    </p>
                                </div>
                            )}
                        </aside>
                    </div>

                    {/* CUSTOM ELEGANT MODAL DIALOGS (Zero Native Browser Window Overrides) */}
                    {isConfirmOpen && (
                        <div className="fixed inset-0 bg-slate-900/40 flex items-center justify-center p-4 z-50 backdrop-blur-sm">
                            <div className="bg-white border border-slate-200 rounded-2xl p-6 max-w-md w-full shadow-xl space-y-4">
                                <div className="flex items-center space-x-3 text-amber-500">
                                    <i className="fa-solid fa-triangle-exclamation text-xl"></i>
                                    <h4 className="font-bold text-base text-slate-950">{confirmTitle}</h4>
                                </div>
                                <p className="text-xs text-slate-500 leading-relaxed">
                                    {confirmMessage}
                                </p>
                                <div className="flex items-center justify-end space-x-3 pt-1">
                                    <button
                                        onClick={() => setIsConfirmOpen(false)}
                                        className="px-4 py-2 bg-slate-100 hover:bg-slate-200 text-slate-700 rounded-xl text-xs font-semibold transition"
                                    >
                                        取消
                                    </button>
                                    <button
                                        onClick={() => {
                                            if (confirmAction) confirmAction();
                                            setIsConfirmOpen(false);
                                        }}
                                        className="px-4 py-2 bg-cyan-600 hover:bg-cyan-500 text-white font-bold rounded-xl text-xs transition"
                                    >
                                        確認執行
                                    </button>
                                </div>
                            </div>
                        </div>
                    )}
                </div>
            );
        }

        // Mount core react component to DOM
        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
