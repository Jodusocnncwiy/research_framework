<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Jodus研究架構規劃大師 - 自由探索創意沙盒</title>
    <!-- Tailwind CSS for utility styling -->
    <script src="https://cdn.tailwindcss.com"></script>
    <!-- React & ReactDOM via CDN (Production Builds) -->
    <script src="https://unpkg.com/react@18/umd/react.production.min.js" crossorigin></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js" crossorigin></script>
    <!-- Babel standalone for browser transpilation of JSX -->
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <!-- FontAwesome for gorgeous academic and scientific icons -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <!-- Google Fonts Inter & Noto Sans TC -->
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&family=Noto+Sans+TC:wght@400;500;700;900&display=swap" rel="stylesheet">
    <!-- html-to-image library for canvas PNG exporting -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/html-to-image/1.11.11/html-to-image.min.js"></script>
    
    <style>
        body {
            font-family: 'Inter', 'Noto Sans TC', sans-serif;
        }
        /* Custom scrollbars for a premium light UI look */
        ::-webkit-scrollbar {
            width: 8px;
            height: 8px;
        }
        ::-webkit-scrollbar-track {
            background: #e2e8f0;
        }
        ::-webkit-scrollbar-thumb {
            background: #cbd5e1;
            border-radius: 4px;
        }
        ::-webkit-scrollbar-thumb:hover {
            background: #94a3b8;
        }
        /* Pulse keyframe for drop-zones and connectors */
        @keyframes custom-pulse {
            0%, 100% { transform: scale(1); opacity: 0.4; }
            50% { transform: scale(1.25); opacity: 0.9; }
        }
        .animate-pulse-custom {
            transform-origin: center;
            animation: custom-pulse 1.5s infinite ease-in-out;
        }
    </style>
</head>
<body class="bg-slate-50 text-slate-800 overflow-hidden h-screen">

    <div id="root"></div>

    <script type="text/babel">
        const { useState, useEffect, useRef } = React;

        // Predefined variable roles with clear academic definitions and beautiful light color schemes
        const VARIABLE_TYPES = {
            IV: {
                label: '自變數 (IV)',
                desc: '獨立變數，預測或引發因果關係的起點',
                bgColor: 'bg-indigo-50/90 hover:bg-indigo-100/90',
                borderColor: 'border-indigo-400',
                textColor: 'text-indigo-900',
                badgeColor: 'bg-indigo-600 text-white',
                rawColor: '#4f46e5'
            },
            MV: {
                label: '中介變數 (MV)',
                desc: '說明自變數如何以及為何影響應變數的橋樑',
                bgColor: 'bg-purple-50/90 hover:bg-purple-100/90',
                borderColor: 'border-purple-400',
                textColor: 'text-purple-900',
                badgeColor: 'bg-purple-600 text-white',
                rawColor: '#9333ea'
            },
            DV: {
                label: '應變數 (DV)',
                desc: '受自變數或中介變數影響的最終研究結果',
                bgColor: 'bg-emerald-50/90 hover:bg-emerald-100/90',
                borderColor: 'border-emerald-400',
                textColor: 'text-emerald-900',
                badgeColor: 'bg-emerald-600 text-white',
                rawColor: '#059669'
            },
            MOD: {
                label: '調節變數 (Mod)',
                desc: '影響自變數與應變數之間關係強度或方向的第三變數',
                bgColor: 'bg-amber-50/90 hover:bg-amber-100/90',
                borderColor: 'border-amber-400',
                textColor: 'text-amber-900',
                badgeColor: 'bg-amber-500 text-white',
                rawColor: '#d97706'
            },
            CV: {
                label: '控制變數 (CV)',
                desc: '可能影響應變數但非研究主體，需保持恆定的變數',
                bgColor: 'bg-slate-100/90 hover:bg-slate-200/90',
                borderColor: 'border-slate-350',
                textColor: 'text-slate-800',
                badgeColor: 'bg-slate-500 text-white',
                rawColor: '#64748b'
            }
        };

        // Preset Research Frameworks
        const TEMPLATES = {
            MEDIATION: {
                name: '經典中介模型 (基礎)',
                desc: '探討用功時數（自變數）如何透過理解程度（中介變數）來提高成績（應變數）。',
                nodes: [
                    { id: 'node-iv', x: 100, y: 250, label: '用功時數', type: 'IV', width: 160, height: 60 },
                    { id: 'node-mv', x: 420, y: 120, label: '理解程度', type: 'MV', width: 160, height: 60 },
                    { id: 'node-dv', x: 740, y: 250, label: '成績表現', type: 'DV', width: 160, height: 60 }
                ],
                edges: [
                    { id: 'edge-1', fromNodeId: 'node-iv', toTargetId: 'node-mv', toType: 'node', label: 'H1', effect: '+', desc: '用功時數越多，理解程度越高' },
                    { id: 'edge-2', fromNodeId: 'node-mv', toTargetId: 'node-dv', toType: 'node', label: 'H2', effect: '+', desc: '理解程度越高，成績表現越好' },
                    { id: 'edge-3', fromNodeId: 'node-iv', toTargetId: 'node-dv', toType: 'node', label: 'H3', effect: '+', desc: '用功時數對成績表現的直接正向影響' }
                ]
            },
            MODERATED_MEDIATION: {
                name: '中介調節模型 (進階探索)',
                desc: '複雜架構：中介過程中的某個核心因果路徑受到調節變數（例如：教學方法）的干擾影響。',
                nodes: [
                    { id: 'node-iv', x: 100, y: 280, label: '用功時數', type: 'IV', width: 160, height: 60 },
                    { id: 'node-mv', x: 420, y: 150, label: '理解程度', type: 'MV', width: 160, height: 60 },
                    { id: 'node-dv', x: 740, y: 280, label: '成績表現', type: 'DV', width: 160, height: 60 },
                    { id: 'node-mod', x: 260, y: 20, label: '教學方法', type: 'MOD', width: 160, height: 60 }
                ],
                edges: [
                    { id: 'edge-iv-mv', fromNodeId: 'node-iv', toTargetId: 'node-mv', toType: 'node', label: 'H1', effect: '+', desc: '用功時數正向影響理解程度' },
                    { id: 'edge-mv-dv', fromNodeId: 'node-mv', toTargetId: 'node-dv', toType: 'node', label: 'H2', effect: '+', desc: '理解程度正向影響成績表現' },
                    { id: 'edge-iv-dv', fromNodeId: 'node-iv', toTargetId: 'node-dv', toType: 'node', label: 'H3', effect: '+', desc: '用功時數直接影響成績表現' },
                    { id: 'edge-mod-path', fromNodeId: 'node-mod', toTargetId: 'edge-iv-mv', toType: 'edge', label: 'H4', effect: '+', desc: '合適的教學方法能增強用功時數轉換為理解程度的效果' }
                ]
            },
            EXPLORATION_SANDBOX: {
                name: '【多重因果探索】超級創意沙盒',
                desc: '自由發想不設限：同時包含雙中介、雙調節以及先前學業起點控制的超強探索模型。',
                nodes: [
                    { id: 'node-iv', x: 60, y: 310, label: '學習投入度', type: 'IV', width: 160, height: 60 },
                    { id: 'node-mv1', x: 380, y: 160, label: '概念理解力', type: 'MV', width: 160, height: 60 },
                    { id: 'node-mv2', x: 380, y: 310, label: '自我效能感', type: 'MV', width: 160, height: 60 },
                    { id: 'node-dv', x: 740, y: 310, label: '學術成就', type: 'DV', width: 160, height: 60 },
                    { id: 'node-mod1', x: 210, y: 40, label: '教師反饋品質', type: 'MOD', width: 160, height: 60 },
                    { id: 'node-mod2', x: 570, y: 40, label: '同儕支持系統', type: 'MOD', width: 160, height: 60 },
                    { id: 'node-cv', x: 740, y: 160, label: '先前學業起點', type: 'CV', width: 160, height: 60 }
                ],
                edges: [
                    { id: 'edge-iv-mv1', fromNodeId: 'node-iv', toTargetId: 'node-mv1', toType: 'node', label: 'H1', effect: '+', desc: '學習投入正向提升理解力' },
                    { id: 'edge-iv-mv2', fromNodeId: 'node-iv', toTargetId: 'node-mv2', toType: 'node', label: 'H2', effect: '+', desc: '學習投入強化自我效能' },
                    { id: 'edge-mv1-dv', fromNodeId: 'node-mv1', toTargetId: 'node-dv', toType: 'node', label: 'H3', effect: '+', desc: '概念理解增進學術成就' },
                    { id: 'edge-mv2-dv', fromNodeId: 'node-mv2', toTargetId: 'node-dv', toType: 'node', label: 'H4', effect: '+', desc: '自我效能推升學術成就' },
                    { id: 'edge-mod1-act', fromNodeId: 'node-mod1', toTargetId: 'edge-iv-mv1', toType: 'edge', label: 'H5', effect: '+', desc: '教師的高品質反饋，會放大投入度轉換成理解力的效果' },
                    { id: 'edge-mod2-act', fromNodeId: 'node-mod2', toTargetId: 'edge-mv1-dv', toType: 'edge', label: 'H6', effect: '+', desc: '同儕支持有助於將理解力轉換為更卓越的學術成就' },
                    { id: 'edge-cv-dv', fromNodeId: 'node-cv', toTargetId: 'node-dv', toType: 'node', label: 'C1', effect: '+', desc: '控制學生的先前學習起點對學術成就的影響' }
                ]
            }
        };

        function App() {
            const [nodes, setNodes] = useState(() => {
                const local = localStorage.getItem('research_nodes_light_jodus');
                return local ? JSON.parse(local) : TEMPLATES.MEDIATION.nodes;
            });
            const [edges, setEdges] = useState(() => {
                const local = localStorage.getItem('research_edges_light_jodus');
                return local ? JSON.parse(local) : TEMPLATES.MEDIATION.edges;
            });

            // Active Bottom Tab ('hypotheses' | 'assistant')
            const [activeTab, setActiveTab] = useState('hypotheses');
            const [copySuccess, setCopySuccess] = useState(false);
            const [isExporting, setIsExporting] = useState(false);

            // History Undo/Redo Stacks
            const [history, setHistory] = useState([]);
            const [redoStack, setRedoStack] = useState([]);

            // Selection and dragging states
            const [selectedNodeId, setSelectedNodeId] = useState(null);
            const [selectedEdgeId, setSelectedEdgeId] = useState(null);
            const [draggingNodeId, setDraggingNodeId] = useState(null);
            const [dragOffset, setDragOffset] = useState({ x: 0, y: 0 });
            
            // Connection creation states
            const [connectingFromId, setConnectingFromId] = useState(null);
            const [tempLineEnd, setTempLineEnd] = useState({ x: 0, y: 0 });

            // Custom elegant UI Confirm dialogue (no native alert/confirm)
            const [isConfirmOpen, setIsConfirmOpen] = useState(false);
            const [confirmAction, setConfirmAction] = useState(null);
            const [confirmTitle, setConfirmTitle] = useState('');
            const [confirmMessage, setConfirmMessage] = useState('');

            // Variable creation inputs
            const [newNodeName, setNewNodeName] = useState('');
            const [newNodeType, setNewNodeType] = useState('IV');

            const canvasRef = useRef(null);

            // Synchronize with browser LocalStorage for offline seamless auto-saving
            useEffect(() => {
                localStorage.setItem('research_nodes_light_jodus', JSON.stringify(nodes));
                localStorage.setItem('research_edges_light_jodus', JSON.stringify(edges));
            }, [nodes, edges]);

            // Keyboard Shortcuts (Delete, Backspace for removing, Ctrl+Z, Ctrl+Y for Undo/Redo)
            useEffect(() => {
                const handleKeyDown = (e) => {
                    const activeTag = document.activeElement.tagName;
                    if (activeTag === 'INPUT' || activeTag === 'TEXTAREA' || activeTag === 'SELECT') {
                        return; // Prevent triggering shortcuts while entering text
                    }

                    if (e.key === 'Delete' || e.key === 'Backspace') {
                        if (selectedNodeId || selectedEdgeId) {
                            e.preventDefault();
                            handleDeleteSelected();
                        }
                    }

                    if ((e.ctrlKey || e.metaKey) && e.key.toLowerCase() === 'z') {
                        e.preventDefault();
                        handleUndo();
                    }

                    if ((e.ctrlKey || e.metaKey) && e.key.toLowerCase() === 'y') {
                        e.preventDefault();
                        handleRedo();
                    }
                };

                window.addEventListener('keydown', handleKeyDown);
                return () => window.removeEventListener('keydown', handleKeyDown);
            }, [selectedNodeId, selectedEdgeId, nodes, edges, history, redoStack]);

            // Safe global release to prevent "stuck" dragging when mouse is released outside browser or SVG boundaries
            useEffect(() => {
                const handleGlobalMouseUp = () => {
                    if (draggingNodeId) {
                        saveToHistory();
                        setDraggingNodeId(null);
                    }
                    if (connectingFromId) {
                        setConnectingFromId(null);
                    }
                };
                window.addEventListener('mouseup', handleGlobalMouseUp);
                return () => window.removeEventListener('mouseup', handleGlobalMouseUp);
            }, [draggingNodeId, connectingFromId, nodes, edges]);

            const saveToHistory = (newNodes = nodes, newEdges = edges) => {
                setHistory(prev => [...prev, { 
                    nodes: JSON.parse(JSON.stringify(nodes)), 
                    edges: JSON.parse(JSON.stringify(edges)) 
                }]);
                setRedoStack([]); // Clear redo stack upon user change
            };

            const handleUndo = () => {
                if (history.length === 0) return;
                const previous = history[history.length - 1];
                setRedoStack(prev => [...prev, { 
                    nodes: JSON.parse(JSON.stringify(nodes)), 
                    edges: JSON.parse(JSON.stringify(edges)) 
                }]);
                setNodes(previous.nodes);
                setEdges(previous.edges);
                setHistory(prev => prev.slice(0, -1));
                setSelectedNodeId(null);
                setSelectedEdgeId(null);
            };

            const handleRedo = () => {
                if (redoStack.length === 0) return;
                const next = redoStack[redoStack.length - 1];
                setHistory(prev => [...prev, { 
                    nodes: JSON.parse(JSON.stringify(nodes)), 
                    edges: JSON.parse(JSON.stringify(edges)) 
                }]);
                setNodes(next.nodes);
                setEdges(next.edges);
                setRedoStack(prev => prev.slice(0, -1));
            };

            const triggerConfirm = (title, message, onConfirm) => {
                setConfirmTitle(title);
                setConfirmMessage(message);
                setConfirmAction(() => onConfirm);
                setIsConfirmOpen(true);
            };

            const handleTemplateChange = (key) => {
                triggerConfirm(
                    '載入全新思考模型',
                    `您確定要載入 ${TEMPLATES[key].name} 嗎？這將會覆寫目前畫布中的所有變數與路徑設定。`,
                    () => {
                        saveToHistory();
                        setNodes(TEMPLATES[key].nodes);
                        setEdges(TEMPLATES[key].edges);
                        setSelectedNodeId(null);
                        setSelectedEdgeId(null);
                    }
                );
            };

            const getPortCoordinates = (fromNode, toNode) => {
                const x1 = fromNode.x + fromNode.width / 2;
                const y1 = fromNode.y + fromNode.height / 2;
                const x2 = toNode.x + toNode.width / 2;
                const y2 = toNode.y + toNode.height / 2;

                const dx = x2 - x1;
                const dy = y2 - y1;

                let p1 = { x: x1, y: y1 };
                let p2 = { x: x2, y: y2 };

                // Snap lines to rectangular borders intelligently based on angle
                if (Math.abs(dx) > Math.abs(dy)) {
                    if (dx > 0) {
                        p1 = { x: fromNode.x + fromNode.width, y: y1 };
                        p2 = { x: toNode.x, y: y2 };
                    } else {
                        p1 = { x: fromNode.x, y: y1 };
                        p2 = { x: toNode.x + toNode.width, y: y2 };
                    }
                } else {
                    if (dy > 0) {
                        p1 = { x: x1, y: fromNode.y + fromNode.height };
                        p2 = { x: x2, y: toNode.y };
                    } else {
                        p1 = { x: x1, y: fromNode.y };
                        p2 = { x: x2, y: toNode.y + toNode.height };
                    }
                }
                return { p1, p2 };
            };

            const getEdgeMidpoint = (edge) => {
                const fromNode = nodes.find(n => n.id === edge.fromNodeId);
                if (!fromNode) return { x: 0, y: 0 };

                if (edge.toType === 'node') {
                    const toNode = nodes.find(n => n.id === edge.toTargetId);
                    if (!toNode) return { x: 0, y: 0 };
                    const { p1, p2 } = getPortCoordinates(fromNode, toNode);
                    return { x: (p1.x + p2.x) / 2, y: (p1.y + p2.y) / 2 };
                } else {
                    const targetEdge = edges.find(e => e.id === edge.toTargetId);
                    if (!targetEdge) return { x: 0, y: 0 };
                    const targetMid = getEdgeMidpoint(targetEdge);
                    const fromCenter = { x: fromNode.x + fromNode.width / 2, y: fromNode.y + fromNode.height / 2 };
                    return { x: (fromCenter.x + targetMid.x) / 2, y: (fromCenter.y + targetMid.y) / 2 };
                }
            };

            const getEdgeLine = (edge) => {
                const fromNode = nodes.find(n => n.id === edge.fromNodeId);
                if (!fromNode) return null;

                let targetX, targetY;
                let startX, startY;

                if (edge.toType === 'node') {
                    const toNode = nodes.find(n => n.id === edge.toTargetId);
                    if (!toNode) return null;
                    const { p1, p2 } = getPortCoordinates(fromNode, toNode);
                    startX = p1.x;
                    startY = p1.y;
                    targetX = p2.x;
                    targetY = p2.y;
                } else {
                    const targetEdge = edges.find(e => e.id === edge.toTargetId);
                    if (!targetEdge) return null;
                    const mid = getEdgeMidpoint(targetEdge);
                    
                    const fromCenter = { x: fromNode.x + fromNode.width / 2, y: fromNode.y + fromNode.height / 2 };
                    const dx = mid.x - fromCenter.x;
                    const dy = mid.y - fromCenter.y;
                    
                    if (Math.abs(dx) > Math.abs(dy)) {
                        startX = dx > 0 ? fromNode.x + fromNode.width : fromNode.x;
                        startY = fromCenter.y;
                    } else {
                        startX = fromCenter.x;
                        startY = dy > 0 ? fromNode.y + fromNode.height : fromNode.y;
                    }
                    targetX = mid.x;
                    targetY = mid.y;
                }

                return { startX, startY, targetX, targetY };
            };

            const getNodeMeta = (node) => {
                return VARIABLE_TYPES[node.type] || VARIABLE_TYPES.IV;
            };

            const handleCanvasMouseDown = (e) => {
                if (e.target.id === 'framework-canvas' || e.target.id === 'grid-pattern' || e.target.id === 'canvas-export-area') {
                    setSelectedNodeId(null);
                    setSelectedEdgeId(null);
                }
            };

            const handleNodeMouseDown = (e, nodeId) => {
                e.stopPropagation();
                setSelectedNodeId(nodeId);
                setSelectedEdgeId(null);
                setDraggingNodeId(nodeId);

                const node = nodes.find(n => n.id === nodeId);
                const rect = canvasRef.current.getBoundingClientRect();
                setDragOffset({
                    x: e.clientX - rect.left - node.x,
                    y: e.clientY - rect.top - node.y
                });
            };

            const handleCanvasMouseMove = (e) => {
                if (!canvasRef.current) return;
                const rect = canvasRef.current.getBoundingClientRect();
                const x = e.clientX - rect.left;
                const y = e.clientY - rect.top;

                if (draggingNodeId) {
                    setNodes(prev => prev.map(node => {
                        if (node.id === draggingNodeId) {
                            const nextX = Math.max(20, Math.min(1000, x - dragOffset.x));
                            const nextY = Math.max(20, Math.min(600, y - dragOffset.y));
                            // Smooth grid snapping
                            return { 
                                ...node, 
                                x: Math.round(nextX / 10) * 10, 
                                y: Math.round(nextY / 10) * 10 
                            };
                        }
                        return node;
                    }));
                } else if (connectingFromId) {
                    setTempLineEnd({ x, y });
                }
            };

            const handleCanvasMouseUp = () => {
                if (draggingNodeId) {
                    saveToHistory();
                    setDraggingNodeId(null);
                }
                if (connectingFromId) {
                    setConnectingFromId(null);
                }
            };

            const startConnecting = (e, fromNodeId) => {
                e.stopPropagation();
                setConnectingFromId(fromNodeId);
                const rect = canvasRef.current.getBoundingClientRect();
                setTempLineEnd({
                    x: e.clientX - rect.left,
                    y: e.clientY - rect.top
                });
            };

            const endConnectingOnNode = (e, toNodeId) => {
                if (!connectingFromId) return;
                e.stopPropagation();

                if (connectingFromId === toNodeId) {
                    setConnectingFromId(null);
                    return;
                }

                const exists = edges.some(edge => edge.fromNodeId === connectingFromId && edge.toTargetId === toNodeId && edge.toType === 'node');
                if (exists) {
                    setConnectingFromId(null);
                    return;
                }

                saveToHistory();
                const newEdgeId = `edge-${Date.now()}`;
                const newEdge = {
                    id: newEdgeId,
                    fromNodeId: connectingFromId,
                    toTargetId: toNodeId,
                    toType: 'node',
                    label: `H${edges.length + 1}`,
                    effect: '+',
                    desc: '預測變數與目標變數間之直接關係'
                };

                setEdges(prev => [...prev, newEdge]);
                setSelectedEdgeId(newEdgeId);
                setConnectingFromId(null);
            };

            const endConnectingOnEdge = (e, targetEdgeId) => {
                if (!connectingFromId) return;
                e.stopPropagation();

                const exists = edges.some(edge => edge.fromNodeId === connectingFromId && edge.toTargetId === targetEdgeId && edge.toType === 'edge');
                if (exists) {
                    setConnectingFromId(null);
                    return;
                }

                saveToHistory();
                const newEdgeId = `edge-${Date.now()}`;
                const newEdge = {
                    id: newEdgeId,
                    fromNodeId: connectingFromId,
                    toTargetId: targetEdgeId,
                    toType: 'edge',
                    label: `H${edges.length + 1}`,
                    effect: '+',
                    desc: '此調節變數顯著干擾上述因果關係路徑'
                };

                setEdges(prev => [...prev, newEdge]);
                setSelectedEdgeId(newEdgeId);
                setConnectingFromId(null);
            };

            const handleAddNode = () => {
                if (!newNodeName.trim()) return;
                saveToHistory();
                
                const newNodeId = `node-${Date.now()}`;
                const offset = (nodes.length % 5) * 40;
                const newNode = {
                    id: newNodeId,
                    label: newNodeName,
                    type: newNodeType,
                    x: 350 + offset,
                    y: 200 + offset,
                    width: 160,
                    height: 60
                };

                setNodes(prev => [...prev, newNode]);
                setNewNodeName('');
                setSelectedNodeId(newNodeId);
                setSelectedEdgeId(null);
            };

            const handleDeleteSelected = () => {
                saveToHistory();
                if (selectedNodeId) {
                    setNodes(prev => prev.filter(n => n.id !== selectedNodeId));
                    setEdges(prev => prev.filter(e => 
                        e.fromNodeId !== selectedNodeId && 
                        e.toTargetId !== selectedNodeId && 
                        !(e.toType === 'edge' && isEdgeConnectedToNode(e.toTargetId, selectedNodeId))
                    ));
                    setSelectedNodeId(null);
                } else if (selectedEdgeId) {
                    setEdges(prev => prev.filter(e => e.id !== selectedEdgeId && !(e.toType === 'edge' && e.toTargetId === selectedEdgeId)));
                    setSelectedEdgeId(null);
                }
            };

            const isEdgeConnectedToNode = (edgeId, nodeId) => {
                const edge = edges.find(e => e.id === edgeId);
                if (!edge) return false;
                return edge.fromNodeId === nodeId || edge.toTargetId === nodeId;
            };

            const handleUpdateNodeLabel = (newLabel) => {
                setNodes(prev => prev.map(n => n.id === selectedNodeId ? { ...n, label: newLabel } : n));
            };

            const handleUpdateNodeType = (newType) => {
                setNodes(prev => prev.map(n => n.id === selectedNodeId ? { ...n, type: newType } : n));
            };

            const handleUpdateNodeDesc = (newDesc) => {
                setNodes(prev => prev.map(n => n.id === selectedNodeId ? { ...n, desc: newDesc } : n));
            };

            const handleUpdateEdgeLabel = (newLabel) => {
                setEdges(prev => prev.map(e => e.id === selectedEdgeId ? { ...e, label: newLabel } : e));
            };

            const handleUpdateEdgeEffect = (newEffect) => {
                setEdges(prev => prev.map(e => e.id === selectedEdgeId ? { ...e, effect: newEffect } : e));
            };

            const handleUpdateEdgeDesc = (newDesc) => {
                setEdges(prev => prev.map(e => e.id === selectedEdgeId ? { ...e, desc: newDesc } : e));
            };

            const handleClearCanvas = () => {
                triggerConfirm(
                    '清空整個畫布',
                    '您確定要清空畫布嗎？您目前所有的自訂變數與假說線都將會遺失。',
                    () => {
                        saveToHistory();
                        setNodes([]);
                        setEdges([]);
                        setSelectedNodeId(null);
                        setSelectedEdgeId(null);
                    }
                );
            };

            // Export to PNG Function
            const handleExportPNG = async () => {
                if (!window.htmlToImage) {
                    alert('匯出工具尚未載入完畢，請稍後再試。');
                    return;
                }
                
                setIsExporting(true);
                // Temporarily clear selection for clean export
                const prevNodeId = selectedNodeId;
                const prevEdgeId = selectedEdgeId;
                setSelectedNodeId(null);
                setSelectedEdgeId(null);

                // Small delay to allow react render the unselected state
                setTimeout(async () => {
                    const node = document.getElementById('canvas-export-area');
                    if (!node) {
                        setIsExporting(false);
                        return;
                    }
                    try {
                        const dataUrl = await window.htmlToImage.toPng(node, {
                            quality: 1.0,
                            pixelRatio: 2, // higher resolution
                            backgroundColor: '#CCFFFF'
                        });
                        const link = document.createElement('a');
                        link.download = '研究架構圖_Jodus.png';
                        link.href = dataUrl;
                        link.click();
                    } catch (error) {
                        console.error('Export PNG failed:', error);
                        triggerConfirm('匯出失敗', '無法產生圖片，這可能是因為瀏覽器的安全性限制或元件過於複雜。');
                    } finally {
                        setSelectedNodeId(prevNodeId);
                        setSelectedEdgeId(prevEdgeId);
                        setIsExporting(false);
                    }
                }, 100);
            };

            const selectedNode = nodes.find(n => n.id === selectedNodeId);
            const selectedEdge = edges.find(e => e.id === selectedEdgeId);

            const getNodeLabel = (id) => {
                const node = nodes.find(n => n.id === id);
                return node ? node.label : '未知變數';
            };

            const getEdgeLabelRepresentation = (edge) => {
                const fromLabel = getNodeLabel(edge.fromNodeId);
                if (edge.toType === 'node') {
                    const toLabel = getNodeLabel(edge.toTargetId);
                    return `${fromLabel} ➜ ${toLabel}`;
                } else {
                    const targetEdge = edges.find(e => e.id === edge.toTargetId);
                    if (targetEdge) {
                        return `${fromLabel} 調節 [${getEdgeLabelRepresentation(targetEdge)}]`;
                    }
                    return `${fromLabel} 產生調節作用`;
                }
            };

            // Dynamic Framework Narrative and suggestion builder
            const analyzeFramework = () => {
                const formatNode = n => n.label + (n.desc ? `（定義：${n.desc}）` : '');
                const ivs = nodes.filter(n => n.type === 'IV').map(formatNode);
                const mvs = nodes.filter(n => n.type === 'MV').map(formatNode);
                const dvs = nodes.filter(n => n.type === 'DV').map(formatNode);
                const mods = nodes.filter(n => n.type === 'MOD').map(formatNode);
                const cvs = nodes.filter(n => n.type === 'CV').map(formatNode);

                let storyline = "這是一個客製化的研究架構。";
                if (ivs.length > 0 && dvs.length > 0) {
                    storyline = `本研究主要探索自變數【${ivs.join('、')}】對應變數【${dvs.join('、')}】之關係主軸。`;
                    if (mvs.length > 0) {
                        storyline += ` 為了打開其間的作用機制，本架構引入了中介變數機制【${mvs.join('、')}】，藉此探討「因果關係如何發生 (How)」。`;
                    }
                    if (mods.length > 0) {
                        storyline += ` 同時，考量到此影響關係受外在條件干擾，本架構加入了調節因素【${mods.join('、')}】，用以釐清關係何時成立或更顯著的「邊界情境 (When)」。`;
                    }
                    if (cvs.length > 0) {
                        storyline += ` 此外，本研究亦納入並控制了【${cvs.join('、')}】等可能干擾因果關係的外生變數，以確保研究效度。`;
                    }
                } else {
                    storyline = "請在畫布中至少加入自變數 (IV) 與應變數 (DV)，創意發想助理將自動為您生成整合的故事線！";
                }

                // Methodology suggestions
                let statsRecommendation = "多元線性迴歸 (Regression Analysis)";
                let modelReference = "";
                if (mvs.length > 0 && mods.length > 0) {
                    statsRecommendation = "中介調節分析 (Moderated Mediation) / 結構方程模型 (SEM)";
                    modelReference = "建議使用 SPSS PROCESS 模組（如 Model 7, 14, 15 等），或是使用 Mplus/AMOS 跑多元中介與交互效應檢定。";
                } else if (mvs.length > 0) {
                    statsRecommendation = "中介效應分析 (Mediation Analysis)";
                    modelReference = `建議使用 SPSS PROCESS Model 4 (平行中介) 或 Model 6 (鏈狀中介)。`;
                } else if (mods.length > 0) {
                    statsRecommendation = "調節迴歸分析 (Moderation Analysis)";
                    modelReference = "建議使用 SPSS PROCESS Model 1，進行交互作用項 (Interaction Term) 的顯著性檢定與簡單斜率分析 (Simple Slopes)。";
                }

                // AI Prompt generator for literature
                const aiPromptText = `我正在進行一項學術研究，以下是我的理論架構變數：
- 自變數 (IV)：${ivs.join('、') || '無'}
- 中介變數 (MV)：${mvs.join('、') || '無'}
- 應變數 (DV)：${dvs.join('、') || '無'}
- 調節變數 (Moderator)：${mods.join('、') || '無'}
- 控制變數 (CV)：${cvs.join('、') || '無'}

請針對這個研究模型：
1. 幫我寫一份吸引人的「研究動機與重要性」草稿。
2. 指出該架構之變數配置在現有文獻中有何潛在理論創新之處 (Academic Novelty)？
3. 提出 3 個未來撰寫文獻探討時可以引用的主要理論流派（例如社會認知理論、資源保存理論等）來支持此模型。`;

                return { storyline, statsRecommendation, modelReference, aiPromptText };
            };

            const copyToClipboard = (text) => {
                const textArea = document.createElement("textarea");
                textArea.value = text;
                textArea.style.position = "fixed"; 
                document.body.appendChild(textArea);
                textArea.focus();
                textArea.select();
                try {
                    document.execCommand('copy');
                    setCopySuccess(true);
                    setTimeout(() => setCopySuccess(false), 2000);
                } catch (err) {
                    console.error('Fallback copy failed', err);
                }
                document.body.removeChild(textArea);
            };

            // Academic Hypotheses Auto-Generator (Filtered Control Variables)
            const generateHypotheses = () => {
                return edges.map(edge => {
                    const fromNode = nodes.find(n => n.id === edge.fromNodeId);
                    
                    // Filter: Skip hypotheses generation if the starting node is a Control Variable (CV)
                    if (!fromNode || fromNode.type === 'CV') return null;

                    const directionText = edge.effect === '+' ? '正向' : edge.effect === '-' ? '負向' : '顯著';

                    if (edge.toType === 'node') {
                        const toNode = nodes.find(n => n.id === edge.toTargetId);
                        
                        // Filter: Skip hypotheses generation if the target node is a Control Variable (CV)
                        if (!toNode || toNode.type === 'CV') return null;
                        
                        let contextTag = '';
                        if (fromNode.type === 'IV' && toNode.type === 'MV') contextTag = ' (中介路徑前半段)';
                        if (fromNode.type === 'MV' && toNode.type === 'DV') contextTag = ' (中介路徑後半段)';
                        if (fromNode.type === 'IV' && toNode.type === 'DV') contextTag = ' (直接影響效果)';

                        return {
                            id: edge.id,
                            code: edge.label,
                            text: `假設 ${edge.label}：【${fromNode.label}】對【${toNode.label}】具有顯著的${directionText}影響。${contextTag}`,
                            desc: edge.desc
                        };
                    } else {
                        const targetEdge = edges.find(e => e.id === edge.toTargetId);
                        if (!targetEdge) return null;
                        
                        // Deep check: If the target edge involves a CV, skip moderation hypothesis as well
                        const targetEdgeFromNode = nodes.find(n => n.id === targetEdge.fromNodeId);
                        const targetEdgeToNode = targetEdge.toType === 'node' ? nodes.find(n => n.id === targetEdge.toTargetId) : null;
                        if (targetEdgeFromNode?.type === 'CV' || targetEdgeToNode?.type === 'CV') return null;

                        const targetFrom = getNodeLabel(targetEdge.fromNodeId);
                        const targetTo = getNodeLabel(targetEdge.toTargetId);

                        return {
                            id: edge.id,
                            code: edge.label,
                            text: `假設 ${edge.label}：【${fromNode.label}】在【${targetFrom}】影響【${targetTo}】的因果關係中扮演著顯著的調節（干擾）角色。`,
                            desc: edge.desc
                        };
                    }
                }).filter(Boolean);
            };

            const hypothesesList = generateHypotheses();
            const analysis = analyzeFramework();

            // Export to Markdown Function
            const handleExportMarkdown = () => {
                const mdLines = [];
                mdLines.push('# 研究計畫書大綱');
                mdLines.push('');
                
                mdLines.push('## 一、 變數清單與操作化定義');
                if (nodes.length === 0) {
                    mdLines.push('（目前畫布中尚未建立變數）');
                } else {
                    nodes.forEach(n => {
                        const meta = VARIABLE_TYPES[n.type];
                        mdLines.push(`### ${n.label} (${meta.label})`);
                        mdLines.push(`- **學術定義/衡量備註**：${n.desc || '尚未填寫'}`);
                        mdLines.push('');
                    });
                }

                mdLines.push('## 二、 研究假說清單 (排除控制變數)');
                if (hypothesesList.length === 0) {
                    mdLines.push('（目前尚未建立主要研究假說）');
                } else {
                    hypothesesList.forEach(h => {
                        mdLines.push(`- **${h.code}**：${h.text}`);
                        if (h.desc) mdLines.push(`  - *理論補充：${h.desc}*`);
                    });
                }
                mdLines.push('');

                mdLines.push('## 三、 AI 寫作提示詞');
                mdLines.push('```text');
                mdLines.push(analysis.aiPromptText);
                mdLines.push('```');

                const blob = new Blob([mdLines.join('\n')], { type: 'text/markdown;charset=utf-8;' });
                const url = URL.createObjectURL(blob);
                const link = document.createElement('a');
                link.href = url;
                link.download = '研究計畫書大綱_Jodus.md';
                link.click();
                URL.revokeObjectURL(url);
            };

            return (
                <div className="flex flex-col h-screen bg-slate-50 text-slate-800 overflow-hidden">
                    
                    {/* Fixed Top Header block */}
                    <header className="flex items-center justify-between px-6 py-4 bg-white border-b border-slate-200 shrink-0 shadow-sm select-none z-10">
                        {/* Title & Brand */}
                        <div className="flex items-center space-x-3">
                            <div className="p-2.5 bg-cyan-600 rounded-xl text-white">
                                <i className="fa-solid fa-compass-drafting text-lg"></i>
                            </div>
                            <div>
                                <h1 className="text-lg font-bold tracking-tight text-slate-900 flex items-center gap-2">
                                    <span>Jodus研究架構規劃大師</span>
                                    <span className="text-[10px] bg-cyan-50 text-cyan-700 font-semibold px-2 py-0.5 rounded-full border border-cyan-200/80">創意探索沙盒</span>
                                </h1>
                                <p className="text-xs text-slate-500">自由勾勒任何變數可能關係。點選變數右上角拉出關係箭頭，雙擊或右側面板微調假說設定</p>
                            </div>
                        </div>

                        {/* Top panel utility buttons */}
                        <div className="flex items-center space-x-2">
                            <button 
                                onClick={handleUndo} 
                                disabled={history.length === 0}
                                className={`p-2 rounded-lg text-slate-500 transition ${history.length === 0 ? 'opacity-30 cursor-not-allowed' : 'hover:bg-slate-100 hover:text-slate-900'}`}
                                title="復原 (Ctrl + Z)"
                            >
                                <i className="fa-solid fa-arrow-rotate-left"></i>
                            </button>
                            <button 
                                onClick={handleRedo} 
                                disabled={redoStack.length === 0}
                                className={`p-2 rounded-lg text-slate-500 transition ${redoStack.length === 0 ? 'opacity-30 cursor-not-allowed' : 'hover:bg-slate-100 hover:text-slate-900'}`}
                                title="重做 (Ctrl + Y)"
                            >
                                <i className="fa-solid fa-arrow-rotate-right"></i>
                            </button>
                            <div className="h-5 w-px bg-slate-200 mx-1"></div>
                            <button 
                                onClick={handleClearCanvas} 
                                className="px-3 py-1.5 text-xs bg-rose-50 text-rose-700 hover:bg-rose-100 border border-rose-200 rounded-lg font-medium transition flex items-center space-x-1.5 mr-1"
                            >
                                <i className="fa-solid fa-trash-can"></i>
                                <span>清空</span>
                            </button>
                            
                            <div className="h-5 w-px bg-slate-200 mx-1"></div>
                            
                            {/* NEW: Export Buttons */}
                            <button 
                                onClick={handleExportPNG}
                                disabled={isExporting}
                                className={`px-3 py-1.5 text-xs bg-indigo-50 text-indigo-700 hover:bg-indigo-100 border border-indigo-200 rounded-lg font-medium transition flex items-center space-x-1.5 ${isExporting ? 'opacity-50 cursor-wait' : ''}`}
                            >
                                <i className={`fa-solid ${isExporting ? 'fa-spinner fa-spin' : 'fa-image'}`}></i>
                                <span>匯出圖檔 (PNG)</span>
                            </button>
                            <button 
                                onClick={handleExportMarkdown} 
                                className="px-3 py-1.5 text-xs bg-emerald-50 text-emerald-700 hover:bg-emerald-100 border border-emerald-200 rounded-lg font-medium transition flex items-center space-x-1.5"
                            >
                                <i className="fa-solid fa-file-lines"></i>
                                <span>下載大綱 (MD)</span>
                            </button>
                        </div>
                    </header>

                    {/* MAIN SPLIT-VIEW CONTAINER */}
                    <div className="flex flex-1 overflow-hidden">
                        
                        {/* LEFT SIDEBAR PANEL */}
                        <aside className="w-80 bg-white border-r border-cyan-100/80 p-5 flex flex-col space-y-5 overflow-y-auto shrink-0 select-none">
                            
                            {/* Templates selector */}
                            <div>
                                <h3 className="text-xs font-bold tracking-wider uppercase text-cyan-700 mb-2.5 flex items-center gap-1.5">
                                    <i className="fa-solid fa-layer-group"></i>
                                    <span>1. 快速載入架構範本</span>
                                </h3>
                                <div className="space-y-2">
                                    {Object.entries(TEMPLATES).map(([key, temp]) => {
                                        const isMatch = JSON.stringify(temp.nodes) === JSON.stringify(nodes) && JSON.stringify(temp.edges) === JSON.stringify(edges);
                                        return (
                                            <button
                                                key={key}
                                                onClick={() => handleTemplateChange(key)}
                                                className={`w-full text-left p-3 rounded-xl border transition flex flex-col space-y-1 ${
                                                    isMatch 
                                                        ? 'bg-cyan-50/50 border-cyan-400 text-cyan-900 shadow-sm shadow-cyan-100/40' 
                                                        : 'bg-slate-50/50 border-slate-200 text-slate-600 hover:border-slate-300 hover:bg-slate-50'
                                                }`}
                                            >
                                                <span className="font-bold text-xs">{temp.name}</span>
                                                <span className="text-[11px] text-slate-500 leading-relaxed font-normal">{temp.desc}</span>
                                            </button>
                                        );
                                    })}
                                </div>
                            </div>

                            {/* Variable Creator Tool */}
                            <div className="border-t border-slate-100 pt-4">
                                <h3 className="text-xs font-bold tracking-wider uppercase text-cyan-700 mb-2.5 flex items-center gap-1.5">
                                    <i className="fa-solid fa-circle-plus"></i>
                                    <span>2. 增加自訂研究變數</span>
                                </h3>
                                <div className="space-y-3 bg-slate-50/50 p-4 rounded-xl border border-slate-200">
                                    <div>
                                        <label className="block text-[11px] text-slate-500 mb-1 font-medium">變數名稱</label>
                                        <input
                                            type="text"
                                            placeholder="請輸入：如「學習成效」"
                                            value={newNodeName}
                                            onChange={(e) => setNewNodeName(e.target.value)}
                                            onKeyDown={(e) => e.key === 'Enter' && handleAddNode()}
                                            className="w-full bg-white border border-slate-200 rounded-lg px-3 py-2 text-xs text-slate-800 placeholder-slate-400 focus:outline-none focus:border-cyan-500 transition shadow-sm"
                                        />
                                    </div>

                                    <div>
                                        <label className="block text-[11px] text-slate-500 mb-1 font-medium">學術角色定位</label>
                                        <div className="space-y-1 max-h-48 overflow-y-auto pr-1">
                                            {Object.entries(VARIABLE_TYPES).map(([key, meta]) => (
                                                <button
                                                    key={key}
                                                    type="button"
                                                    onClick={() => setNewNodeType(key)}
                                                    className={`w-full flex items-center space-x-2.5 px-3 py-1.5 rounded-lg text-xs border text-left transition ${
                                                        newNodeType === key 
                                                            ? 'bg-white border-cyan-500 text-cyan-900 font-bold shadow-sm' 
                                                            : 'bg-white/40 border-transparent text-slate-500 hover:bg-white/90 hover:border-slate-200'
                                                    }`}
                                                    title={meta.desc}
                                                >
                                                    <span className="w-2.5 h-2.5 rounded-full" style={{ backgroundColor: meta.rawColor }}></span>
                                                    <span className="flex-1">{meta.label}</span>
                                                </button>
                                            ))}
                                        </div>
                                    </div>

                                    <button
                                        onClick={handleAddNode}
                                        className="w-full bg-cyan-600 hover:bg-cyan-500 text-white text-xs font-semibold py-2 rounded-lg transition shadow-md flex items-center justify-center space-x-1.5"
                                    >
                                        <i className="fa-solid fa-circle-nodes"></i>
                                        <span>放置到畫布</span>
                                    </button>
                                </div>
                            </div>

                            {/* Help box */}
                            <div className="border-t border-slate-100 pt-4 mt-auto text-[11px] text-slate-500 leading-relaxed bg-cyan-50/30 p-3 rounded-xl border border-cyan-100/50 select-none">
                                <span className="font-bold text-cyan-800 block mb-1">
                                    <i className="fa-solid fa-circle-info mr-1"></i>快捷流暢操作提示
                                </span>
                                <ul className="list-disc pl-4 space-y-1 text-slate-500">
                                    <li>**自由拖曳**：用滑鼠直接拖拉變數以調整位置。</li>
                                    <li>**新增因果關係**：點選變數右上角 <span className="text-emerald-500 font-bold">●</span> 拉出一條線指向其他變數。</li>
                                    <li>**新增調節效果**：從 <span className="text-amber-500 font-bold">調節變數</span> 的右上角拉線，對準其他**路徑連線中央的黃色亮環**放下即可！</li>
                                    <li>點選畫布元件後按 <kbd className="px-1 py-0.5 bg-slate-200 border border-slate-300 rounded text-[10px]">Del</kbd> 或 <kbd className="px-1 py-0.5 bg-slate-200 border border-slate-300 rounded text-[10px]">Backspace</kbd> 鍵可直接刪除。</li>
                                </ul>
                            </div>
                        </aside>

                        {/* CENTER CANVAS WORKSPACE */}
                        <main className="flex-1 flex flex-col bg-slate-50 overflow-hidden relative">
                            
                            {/* Canvas Section - wrapped in Export Area */}
                            <div className="flex-1 relative overflow-auto select-none bg-[#CCFFFF]" onMouseDown={handleCanvasMouseDown}>
                                {/* Explicit width/height wrapper for html-to-image accurate rendering */}
                                <div id="canvas-export-area" className="w-[1200px] h-[750px] relative bg-[#CCFFFF]">
                                    <svg
                                        id="framework-canvas"
                                        ref={canvasRef}
                                        className="absolute inset-0 w-full h-full"
                                        onMouseMove={handleCanvasMouseMove}
                                        onMouseUp={handleCanvasMouseUp}
                                    >
                                        {/* Grids and Patterns */}
                                        <defs>
                                            <pattern id="grid-pattern" width="20" height="20" patternUnits="userSpaceOnUse">
                                                <path d="M 20 0 L 0 0 0 20" fill="none" stroke="#0ea5e9" strokeWidth="0.5" strokeOpacity="0.12" />
                                            </pattern>
                                            <marker
                                                id="arrow"
                                                viewBox="0 0 10 10"
                                                refX="8"
                                                refY="5"
                                                markerWidth="8"
                                                markerHeight="8"
                                                orient="auto-start-reverse"
                                            >
                                                <path d="M 0 1.5 L 9 5 L 0 8.5 Z" fill="#475569" />
                                            </marker>
                                            <marker
                                                id="arrow-selected"
                                                viewBox="0 0 10 10"
                                                refX="8"
                                                refY="5"
                                                markerWidth="8"
                                                markerHeight="8"
                                                orient="auto-start-reverse"
                                            >
                                                <path d="M 0 1.5 L 9 5 L 0 8.5 Z" fill="#ea580c" />
                                            </marker>
                                        </defs>

                                        {/* Infinite grid pattern overlay */}
                                        <rect id="grid-pattern" width="100%" height="100%" fill="url(#grid-pattern)" />

                                        {/* RENDER RELATIONSHIPS (EDGES) */}
                                        {edges.map((edge) => {
                                            const line = getEdgeLine(edge);
                                            if (!line) return null;
                                            const isSelected = selectedEdgeId === edge.id;

                                            // Matching colors for slate and orange highlight
                                            const strokeColor = isSelected ? '#ea580c' : edge.toType === 'edge' ? '#d97706' : '#475569';
                                            const strokeStyle = edge.toType === 'edge' ? '4 4' : 'none';

                                            const midX = (line.startX + line.targetX) / 2;
                                            const midY = (line.startY + line.targetY) / 2;

                                            return (
                                                <g key={edge.id} className="group">
                                                    {/* Visual Line */}
                                                    <line
                                                        x1={line.startX}
                                                        y1={line.startY}
                                                        x2={line.targetX}
                                                        y2={line.targetY}
                                                        stroke={strokeColor}
                                                        strokeWidth={isSelected ? 3 : 2}
                                                        strokeDasharray={strokeStyle}
                                                        markerEnd={`url(#${isSelected ? 'arrow-selected' : 'arrow'})`}
                                                        className="transition-all"
                                                    />

                                                    {/* Hidden thicker line for flawless click targeting */}
                                                    <line
                                                        x1={line.startX}
                                                        y1={line.startY}
                                                        x2={line.targetX}
                                                        y2={line.targetY}
                                                        stroke="transparent"
                                                        strokeWidth="16"
                                                        className="cursor-pointer"
                                                        onClick={(e) => {
                                                            e.stopPropagation();
                                                            setSelectedEdgeId(edge.id);
                                                            setSelectedNodeId(null);
                                                        }}
                                                    />

                                                    {/* Label/H-Tag Badge */}
                                                    <g 
                                                        transform={`translate(${midX}, ${midY})`}
                                                        className="cursor-pointer"
                                                        onClick={(e) => {
                                                            e.stopPropagation();
                                                            setSelectedEdgeId(edge.id);
                                                            setSelectedNodeId(null);
                                                        }}
                                                    >
                                                        <rect
                                                            x="-18"
                                                            y="-10"
                                                            width="36"
                                                            height="20"
                                                            rx="4"
                                                            fill={isSelected ? '#ea580c' : '#ffffff'}
                                                            stroke={isSelected ? '#ffffff' : '#cbd5e1'}
                                                            strokeWidth="1"
                                                            className="shadow-sm"
                                                        />
                                                        <text
                                                            textAnchor="middle"
                                                            dominantBaseline="middle"
                                                            fill={isSelected ? '#ffffff' : '#475569'}
                                                            className="text-[10px] font-semibold font-mono"
                                                            y="1"
                                                        >
                                                            {edge.label || 'H'}
                                                        </text>
                                                        {edge.effect && (
                                                            <circle
                                                                cx="16"
                                                                cy="-8"
                                                                r="7"
                                                                fill={edge.effect === '+' ? '#10b981' : '#ef4444'}
                                                                className="stroke-white stroke-2"
                                                            />
                                                        )}
                                                        {edge.effect && (
                                                            <text
                                                                x="16"
                                                                y="-7"
                                                                textAnchor="middle"
                                                                dominantBaseline="middle"
                                                                fill="white"
                                                                className="text-[9px] font-bold"
                                                            >
                                                                {edge.effect}
                                                            </text>
                                                        )}
                                                    </g>

                                                    {edge.toType === 'node' && (
                                                        <g>
                                                            {/* Moderation Path Anchor Zone highlighting - Shows up on link drag */}
                                                            {connectingFromId && connectingFromId !== edge.fromNodeId && (
                                                                <circle
                                                                    cx={midX}
                                                                    cy={midY}
                                                                    r="18"
                                                                    fill="#f59e0b"
                                                                    fillOpacity="0.25"
                                                                    stroke="#d97706"
                                                                    strokeWidth="1.5"
                                                                    strokeDasharray="3 3"
                                                                    className="animate-pulse-custom"
                                                                    style={{ pointerEvents: 'none' }}
                                                                />
                                                            )}
                                                            {/* Invisible larger hover zone for intuitive target dropping */}
                                                            <circle
                                                                cx={midX}
                                                                cy={midY}
                                                                r="24"
                                                                fill="transparent"
                                                                className="cursor-pointer"
                                                                onMouseUp={(e) => endConnectingOnEdge(e, edge.id)}
                                                            />
                                                        </g>
                                                    )}
                                                </g>
                                            );
                                        })}

                                        {/* Temporary Pointer line during connector dragging */}
                                        {connectingFromId && (
                                            <line
                                                x1={(() => {
                                                    const fromNode = nodes.find(n => n.id === connectingFromId);
                                                    return fromNode ? fromNode.x + fromNode.width / 2 : 0;
                                                })()}
                                                y1={(() => {
                                                    const fromNode = nodes.find(n => n.id === connectingFromId);
                                                    return fromNode ? fromNode.y + fromNode.height / 2 : 0;
                                                })()}
                                                x2={tempLineEnd.x}
                                                y2={tempLineEnd.y}
                                                stroke="#059669"
                                                strokeWidth="2"
                                                strokeDasharray="4 4"
                                                markerEnd="url(#arrow)"
                                                style={{ pointerEvents: 'none' }} /* Allows mouse release events to pierce through line */
                                            />
                                        )}

                                        {/* Render Variables Nodes */}
                                        {nodes.map((node) => {
                                            const meta = getNodeMeta(node);
                                            const isSelected = selectedNodeId === node.id;

                                            return (
                                                <g key={node.id} transform={`translate(${node.x}, ${node.y})`}>
                                                    <foreignObject
                                                        width={node.width}
                                                        height={node.height}
                                                        onMouseDown={(e) => handleNodeMouseDown(e, node.id)}
                                                        onMouseUp={(e) => endConnectingOnNode(e, node.id)}
                                                        className="overflow-visible"
                                                    >
                                                        <div
                                                            className={`w-full h-full rounded-xl border-2 px-3.5 py-2 flex flex-col justify-between shadow-md transition-all select-none ${
                                                                isSelected 
                                                                    ? 'border-amber-500 bg-amber-50/95 ring-4 ring-amber-500/15' 
                                                                    : `${meta.borderColor} ${meta.bgColor} ${meta.textColor}`
                                                            }`}
                                                        >
                                                            <div className="flex items-center justify-between">
                                                                <span className={`text-[9px] font-bold px-1.5 py-0.5 rounded ${meta.badgeColor}`}>
                                                                    {meta.label}
                                                                </span>
                                                                
                                                                {/* Line Connector Handle */}
                                                                <div
                                                                    onMouseDown={(e) => startConnecting(e, node.id)}
                                                                    className="w-4 h-4 bg-slate-700 hover:bg-emerald-600 rounded-full flex items-center justify-center cursor-crosshair transition-colors shadow-sm"
                                                                    title="點擊並拖拉出箭頭建立路徑"
                                                                >
                                                                    <span className="text-[10px] text-white font-extrabold leading-none">+</span>
                                                                </div>
                                                            </div>
                                                            <div className="text-center font-bold text-xs truncate mt-1 text-slate-800">
                                                                {node.label}
                                                            </div>
                                                        </div>
                                                    </foreignObject>
                                                </g>
                                            );
                                        })}
                                    </svg>
                                </div>
                                {/* Legend floating overlay */}
                                <div className="absolute bottom-5 left-5 bg-white/90 border border-slate-200 px-4 py-2.5 rounded-xl shadow-md flex items-center gap-4 text-[11px] select-none backdrop-blur-sm">
                                    {Object.entries(VARIABLE_TYPES).map(([key, meta]) => (
                                        <div key={key} className="flex items-center gap-1.5">
                                            <span className="w-2.5 h-2.5 rounded-full inline-block" style={{ backgroundColor: meta.rawColor }}></span>
                                            <span className="text-slate-600 font-medium">{meta.label}</span>
                                        </div>
                                    ))}
                                </div>
                            </div>

                            {/* BOTTOM PANEL - TABS for Hypotheses List vs. Sandbox Assistant */}
                            <div className="h-64 bg-white border-t border-slate-200 flex flex-col shrink-0 shadow-lg">
                                
                                {/* Tabs Header */}
                                <div className="flex items-center justify-between px-5 py-2 border-b border-slate-100 select-none bg-slate-50/50">
                                    <div className="flex items-center space-x-2">
                                        <button
                                            onClick={() => setActiveTab('hypotheses')}
                                            className={`px-4 py-1.5 rounded-lg text-xs font-bold transition flex items-center gap-2 ${
                                                activeTab === 'hypotheses' 
                                                    ? 'bg-cyan-50 border border-cyan-200 text-cyan-800 shadow-sm' 
                                                    : 'text-slate-500 hover:text-slate-800 hover:bg-slate-100'
                                            }`}
                                        >
                                            <i className="fa-solid fa-graduation-cap text-cyan-600"></i>
                                            <span>3-A. 主要研究假說清單</span>
                                            <span className="bg-cyan-100/60 text-cyan-800 text-[10px] px-1.5 py-0.5 rounded-full font-mono">{hypothesesList.length}</span>
                                        </button>

                                        <button
                                            onClick={() => setActiveTab('assistant')}
                                            className={`px-4 py-1.5 rounded-lg text-xs font-bold transition flex items-center gap-2 ${
                                                activeTab === 'assistant' 
                                                    ? 'bg-cyan-50 border border-cyan-200 text-cyan-800 shadow-sm' 
                                                    : 'text-slate-500 hover:text-slate-800 hover:bg-slate-100'
                                            }`}
                                        >
                                            <i className="fa-solid fa-wand-magic-sparkles text-amber-500"></i>
                                            <span>3-B. 💡 研究發想與 AI 寫作助理</span>
                                            <span className="bg-amber-100/60 text-amber-800 text-[9px] px-1.5 py-0.5 rounded-full font-bold">探索中</span>
                                        </button>
                                    </div>
                                    <span className="text-[10px] text-slate-400 font-mono">畫布變更時即時重新生成 (已隱藏 CV)</span>
                                </div>

                                {/* Tab Contents */}
                                <div className="flex-1 p-4 overflow-y-auto">
                                    
                                    {/* Tab 1: Hypotheses List */}
                                    {activeTab === 'hypotheses' && (
                                        <div className="space-y-2 h-full">
                                            {hypothesesList.length === 0 ? (
                                                <div className="h-full flex flex-col items-center justify-center text-slate-400 border-2 border-dashed border-slate-200 rounded-xl bg-slate-50/50 p-6">
                                                    <i className="fa-solid fa-circle-nodes text-lg mb-1.5 text-slate-300"></i>
                                                    <span className="text-xs text-center leading-relaxed">
                                                        目前尚未建立任何主要研究假說關係。<br/>
                                                        請建立變數連接（系統會自動過濾忽略控制變數 CV 的路徑）。
                                                    </span>
                                                </div>
                                            ) : (
                                                hypothesesList.map(hyp => (
                                                    <div key={hyp.id} className="bg-slate-50/50 border border-slate-200/80 p-3 rounded-xl flex items-start space-x-3 hover:border-slate-300 transition">
                                                        <span className="bg-cyan-50 text-cyan-700 font-mono text-xs font-bold px-2.5 py-1 rounded-lg border border-cyan-100 shrink-0">
                                                            {hyp.code}
                                                        </span>
                                                        <div className="flex-1 min-w-0 text-xs text-slate-700">
                                                            <p className="font-semibold leading-relaxed">
                                                                {hyp.text}
                                                            </p>
                                                            {hyp.desc && (
                                                                <p className="text-[10px] text-slate-500 italic mt-1 bg-white/60 py-1 px-2.5 rounded-md border border-slate-200/40">
                                                                    理論補充：{hyp.desc}
                                                                </p>
                                                            )}
                                                        </div>
                                                    </div>
                                                ))
                                            )}
                                        </div>
                                    )}

                                    {/* Tab 2: Sandbox AI Assistant */}
                                    {activeTab === 'assistant' && (
                                        <div className="grid grid-cols-1 md:grid-cols-2 gap-4 h-full">
                                            
                                            {/* Column A: Framework Insights */}
                                            <div className="space-y-4">
                                                <div className="bg-slate-50/80 p-3.5 rounded-xl border border-slate-200 text-xs leading-relaxed">
                                                    <h4 className="font-bold text-slate-700 mb-2 flex items-center gap-1.5 select-none">
                                                        <i className="fa-solid fa-route text-cyan-600"></i>
                                                        <span>模型故事線發想 (Academic Storyline)</span>
                                                    </h4>
                                                    <p className="text-slate-600">{analysis.storyline}</p>
                                                </div>

                                                <div className="bg-slate-50/80 p-3.5 rounded-xl border border-slate-200 text-xs">
                                                    <h4 className="font-bold text-slate-700 mb-1.5 flex items-center gap-1.5 select-none">
                                                        <i className="fa-solid fa-chart-column text-emerald-600"></i>
                                                        <span>方法論與統計模型建議</span>
                                                    </h4>
                                                    <p className="font-bold text-cyan-700 text-[11px]">{analysis.statsRecommendation}</p>
                                                    <p className="text-[11px] text-slate-500 mt-1 leading-relaxed">{analysis.modelReference}</p>
                                                </div>
                                            </div>

                                            {/* Column B: Prompt Generator */}
                                            <div className="flex flex-col h-full bg-slate-50/80 p-3.5 rounded-xl border border-slate-200">
                                                <div className="flex items-center justify-between mb-2 select-none">
                                                    <h4 className="font-bold text-slate-700 text-xs flex items-center gap-1.5">
                                                        <i className="fa-solid fa-clipboard-question text-amber-500"></i>
                                                        <span>AI 論文大綱寫作提示詞 (Copy & Feed)</span>
                                                    </h4>
                                                    <button
                                                        onClick={() => copyToClipboard(analysis.aiPromptText)}
                                                        className={`px-2.5 py-1 rounded text-[10px] font-bold transition flex items-center gap-1.5 ${
                                                            copySuccess 
                                                                ? 'bg-emerald-600 text-white shadow-sm' 
                                                                : 'bg-cyan-600 hover:bg-cyan-500 text-white shadow-sm'
                                                        }`}
                                                    >
                                                        {copySuccess ? (
                                                            <>
                                                                <i className="fa-solid fa-check"></i>
                                                                <span>已複製！</span>
                                                            </>
                                                        ) : (
                                                            <>
                                                                <i className="fa-solid fa-copy"></i>
                                                                <span>一鍵複製提示詞</span>
                                                            </>
                                                        )}
                                                    </button>
                                                </div>
                                                <textarea
                                                    readOnly
